<!DOCTYPE HTML>
<html>
    <head>
        <title>Fontes e Cores</title>
        <meta charset="utf-8">

        <style type="text/css">
            .conteudo {
                font-size: 15px;
            }
            .fontSerif {
                font-family: "Times New Roman", Times, serif;
                font-style: italic;
                font-size: 5em; /* 80px/16= 5em*/
            }

            .fontSans-Serif {
                font-family: "Verdana", Geneva, Tahoma, sans-serif;
                font-style: oblique;
                font-size: 2.5em; /*40px/16= 2.5em */
            }

            .fontMonospace {
                font-family: "Courier New", Courier, monospace;
                font-style: normal;
                font-size: 1.25em; /* 20px/16= 1.25em */
            }
        </style>
    </head>

    <body>
        <div class="conteudo">
        <p class="fontSerif">Programação Web</p>
        <p class="fontSans-Serif">Programação Web</p>
        <p class="fontMonospace">Programação Web</p>

        </div>
    </body>
</html>
