<!DOCTYPE html>
<html>
    <head>
        <title>Atividade 12</title>
        <meta charset="utf-8">

        <style type="text/css">
            .pessoa{
                color:red;
            }
            .pessoa[data-idade='30']{
                color:blue;
            }
            .pessoa::before{
                content: 'Nome:'
            }
            .pessoa::after {
                content: '- Idade:';
            }
        </style>
        <script type="text/javascript">
            function mostravalor(componente){
                var valor = componente.getAttribute('data-idade');
                alert(valor);
            }
        </script>
    </head>

    <body>
        <ul>
            <li class="pessoa" onclick="mostravalor(this)" data-idade="30"> João </li>
            <li class="pessoa" onclick="mostravalor(this)" data-idade="20"> José </li>
            <li class="pessoa" onclick="mostravalor(this)" data-idade="40"> Adriana </li>
        </ul>
    </body>
</html>
